<style>
  html.app-loading{ background:#F2F5FB; }
  html.app-loading body{ opacity:0; }
  html.app-ready body{ opacity:1; transition:opacity .12s ease; }
  @media (prefers-reduced-motion: reduce){ html.app-ready body{ transition:none; } }
</style>
<script>
  (function(){
    const root = document.documentElement;
    let revealed = false;
    function reveal(){
      if (revealed) return;
      revealed = true;
      root.classList.add('app-ready');
      root.classList.remove('app-loading');
    }
    function wait(ms){ return new Promise(resolve=>setTimeout(resolve, ms)); }
    function criticalFontsReady(){
      if (!document.fonts || !document.fonts.load || !document.fonts.check) return Promise.resolve();
      const fonts = [
        '400 16px "DM Sans"',
        '800 32px "Barlow Condensed"',
        '400 24px "Material Symbols Sharp"',
      ];
      if (fonts.every(font=>document.fonts.check(font))) return Promise.resolve();
      return Promise.allSettled(fonts.map(font=>document.fonts.load(font)));
    }
    function waitForFirstPaintAssets(){
      Promise.race([criticalFontsReady(), wait(450)]).then(reveal, reveal);
    }
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', waitForFirstPaintAssets, { once:true });
    else waitForFirstPaintAssets();
    window.addEventListener('load', reveal, { once:true });
    setTimeout(reveal, 900);
  })();
</script>

<style>
  :root {
    --blue-50:#E6EFFC; --blue-300:#7AAAE8; --blue-600:#0A4FBF; --blue-800:#063380;
    --orange-50:#FDEEE5; --orange-300:#F0A06A; --orange-600:#D65905; --orange-800:#8A3903;
    --lime-50:#F5FAD6; --lime-300:#D4E84A; --lime-600:#8FB800; --lime-800:#597300;
    --white:#F2F5FB; --gray-50:#E8EDF7; --gray-600:#525A6A; --ink:#0D0D0D;
    --sp-1:4px; --sp-2:8px; --sp-3:12px; --sp-4:16px; --sp-6:24px; --sp-8:32px; --sp-12:48px; --sp-16:64px;
    --border:2px solid var(--ink);
    --shadow-sm:3px 3px 0 var(--ink); --shadow-md:4px 4px 0 var(--ink); --shadow-lg:6px 6px 0 var(--ink);
    --radius-sm:4px; --radius-pill:999px;
    --font-display:'Barlow Condensed',sans-serif; --font-body:'DM Sans',sans-serif;
    --font-mono:ui-monospace,'Cascadia Code',monospace; --font-icon:'Material Symbols Sharp';
  }

  *,*::before,*::after { box-sizing:border-box; }
  html { font-size:16px; }
  body {
    font-family:var(--font-body);
    background:var(--white);
    color:var(--ink);
    line-height:1.7;
    -webkit-font-smoothing:antialiased;
    margin:0;
  }

  /* ---- NeoBrut typography ---- */
  .h1 { font-family:var(--font-display); font-size:48px; font-weight:800; line-height:1.05; text-transform:uppercase; letter-spacing:0.02em; }
  .h2 { font-family:var(--font-display); font-size:32px; font-weight:800; line-height:1.1;  text-transform:uppercase; letter-spacing:0.02em; }
  .h3 { font-family:var(--font-display); font-size:22px; font-weight:700; line-height:1.2;  text-transform:uppercase; letter-spacing:0.04em; }
  .label { font-family:var(--font-body); font-size:11px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:var(--gray-600); }
  .body-lg { font-size:15px; line-height:1.7; }
  .body-sm { font-size:13px; line-height:1.6; color:var(--gray-600); }
  .mono { font-family:var(--font-mono); font-size:12px; color:var(--gray-600); }

  /* ---- icon ---- */
  .icon { font-family:var(--font-icon); font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0; line-height:1; display:inline-flex; align-items:center; user-select:none; vertical-align:middle; }
  .icon-sm{font-size:18px;} .icon-md{font-size:22px;} .icon-lg{font-size:28px;} .icon-xl{font-size:36px;}

  /* ---- buttons (NeoBrut lift) ---- */
  .btn { display:inline-flex; align-items:center; gap:var(--sp-2); font-family:var(--font-body); font-size:14px; font-weight:700; padding:10px 18px; border:var(--border); border-radius:var(--radius-sm); cursor:pointer; background:var(--white); color:var(--ink); box-shadow:var(--shadow-md); transition:transform .08s ease, box-shadow .08s ease; }
  .btn:hover:not(:disabled){ transform:translate(-2px,-2px); box-shadow:var(--shadow-lg); }
  .btn:active:not(:disabled){ transform:translate(4px,4px); box-shadow:none; }
  .btn:focus-visible { outline:3px solid var(--blue-600); outline-offset:2px; }
  .btn:disabled { opacity:.4; cursor:not-allowed; }
  .btn-primary   { background:var(--blue-600);   color:#fff; }
  .btn-secondary { background:var(--orange-600); color:#fff; }
  .btn-lime      { background:var(--lime-300);   color:var(--ink); }
  .btn-sm { font-size:12px; padding:6px 12px; }

  /* ---- badges ---- */
  .badge { display:inline-flex; align-items:center; gap:var(--sp-1); font-family:var(--font-body); font-size:11px; font-weight:700; padding:3px 10px; border:var(--border); border-radius:var(--radius-pill); letter-spacing:0.04em; text-transform:uppercase; white-space:nowrap; }
  .badge-lime    { background:var(--lime-300);   color:var(--ink); }
  .badge-blue    { background:var(--blue-50);    color:var(--blue-800);   border-color:var(--blue-600); }
  .badge-orange  { background:var(--orange-50);  color:var(--orange-800); border-color:var(--orange-600); }
  .badge-neutral { background:var(--gray-50);    color:var(--gray-600);   border-color:var(--gray-600); }
  .badge-ink     { background:var(--ink);        color:#fff; }
  .badge-red     { background:#FDE7E7;           color:#8A0303; border-color:#C20000; }

  /* ---- card / surfaces ---- */
  .card { background:var(--white); border:var(--border); border-radius:var(--radius-sm); box-shadow:var(--shadow-lg); padding:var(--sp-4); }
  .tile { background:var(--gray-50); border:var(--border); border-radius:var(--radius-sm); padding:var(--sp-3); }

  /* ---- screen transition ---- */
  .screen { display:none; }
  .screen.is-active { display:block; animation:screenIn .32s cubic-bezier(.2,.7,.2,1) both; }
  @keyframes screenIn {
    from { opacity:0; transform:translateY(10px); }
    to   { opacity:1; transform:translateY(0); }
  }

  /* ---- stepper ---- */
  .step-node {
    width:44px; height:44px; border:var(--border); border-radius:var(--radius-pill);
    display:flex; align-items:center; justify-content:center;
    font-family:var(--font-display); font-weight:800; font-size:18px;
    background:var(--gray-50); color:var(--ink); flex-shrink:0; transition:all .2s ease;
  }
  .step-node.is-current { background:var(--blue-50); color:var(--blue-600); box-shadow:var(--shadow-sm); transform:scale(1.06); }
  .step-node.is-done    { background:var(--lime-300); color:var(--ink); }
  .step-connector { flex:1; height:2px; background:var(--ink); margin:0 4px; position:relative; min-width:18px; }
  .step-connector .fill { position:absolute; inset:0; background:var(--lime-600); width:0; transition:width .35s ease; }
  .step-connector.is-filled .fill { width:100%; }
  .step-caption { font-size:11px; font-weight:700; text-align:center; line-height:1.2; max-width:72px; margin:6px auto 0; }
  .step-caption.is-current { color:var(--blue-600); }
  .step-caption.is-done    { color:var(--lime-800); }

  /* ---- confidence meter ---- */
  .meter { height:16px; border:var(--border); border-radius:var(--radius-pill); background:var(--white); overflow:hidden; }
  .meter .fill { height:100%; width:0; transition:width .8s cubic-bezier(.2,.7,.2,1); }

  /* ---- entity highlight (parse step) ---- */
  mark { padding:1px 4px; border-radius:3px; font-style:normal; }
  mark.ent-asset { background:var(--orange-50);  box-shadow:inset 0 -2px 0 var(--orange-600); }
  mark.ent-issue { background:#FBE3D5; color:var(--orange-800); }
  mark.ent-loc   { background:var(--blue-50);    box-shadow:inset 0 -2px 0 var(--blue-600); }

  /* ---- agent "thinking" pulse ---- */
  .pulse { animation:pulse 1.1s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:.45;} 50%{opacity:1;} }

  /* ---- reveal-on-enter (staggered field cards) ---- */
  .reveal { opacity:0; transform:translateY(8px); }
  .screen.is-active .reveal { animation:revealIn .4s ease forwards; }
  @keyframes revealIn { to { opacity:1; transform:translateY(0); } }

  /* ---- count-up number ---- */
  .countup { font-family:var(--font-display); font-weight:800; line-height:1; }

  @media (prefers-reduced-motion: reduce) {
    *,*::before,*::after { transition-duration:0ms !important; animation-duration:0ms !important; }
  }
</style>
</head>

<script>

   "clear" = happy path auto-dispatch (WO-20489)
   "conflict" = ambiguity + rule conflict → human escalation (WO-20481)
============================================================ */

  clear: {
    name: 'Clear path',

      // ---- 1. ISSUE SUBMITTED ----

      // ---- 3. RESPONSIBILITY CHECK (clear) ----

      // ---- 4. WORK ROUTING ----
      () => `
        <div class="card mb-4">
          <div class="flex items-center gap-2 mb-3">

    screens: [
      // ---- 1. ISSUE SUBMITTED ----
      () => `
        <div class="card">
          <div class="flex items-center gap-2 mb-3">

            <span class="label" style="color:var(--ink);">Incoming report · Priya Nair · Unit 4B · 09:14</span>

          <div class="tile body-lg" style="background:var(--gray-50);">

          </div>

/* ============================================================ HTML PARTIAL HELPERS ============================================================ */

function field(label, value, sub, conf, state) {
  const confColor = state==='ok' ? 'var(--lime-800)' : 'var(--orange-800)';
  const confBg    = state==='ok' ? 'var(--lime-50)'  : 'var(--orange-50)';
  const confIcon  = state==='ok' ? 'check' : 'warning';
  return `
    <div class="tile reveal" style="background:var(--gray-50);">
      <div class="label mb-1">${label}</div>
      <div style="font-weight:700; font-size:16px;">${value}</div>
      ${sub ? `<div class="body-sm">${sub}</div>` : ''}
      <span class="badge mt-2" style="background:${confBg}; color:${confColor}; border-color:${confColor};">
        <span class="icon icon-sm">${confIcon}</span> ${conf}
      </span>
    </div>`;
}

function doc(title, body, tag, state) {
  const map = {
    ok:       { bg:'var(--lime-50)',   bc:'var(--lime-600)',   tagBg:'var(--blue-50)',   tagColor:'var(--blue-800)',   tagBorder:'var(--blue-600)' },
    conflict: { bg:'#FDE7E7',          bc:'#C20000',           tagBg:'#FDE7E7',          tagColor:'#8A0303',           tagBorder:'#C20000' },
    neutral:  { bg:'var(--gray-50)',   bc:'var(--ink)',        tagBg:'var(--lime-50)',   tagColor:'var(--lime-800)',   tagBorder:'var(--lime-600)' },
  }[state];
  return `
    <div class="tile reveal mb-2" style="background:${map.bg}; border-color:${map.bc};">
      <div class="flex items-center gap-2 flex-wrap">
        <span class="icon icon-sm" style="color:var(--gray-600);">description</span>
        <span style="font-weight:700;">${title}</span>
        ${tag ? `<span class="badge" style="background:${map.tagBg}; color:${map.tagColor}; border-color:${map.tagBorder};">${state==='ok'?'<span class="icon icon-sm">check</span> ':''}${tag}</span>` : ''}
      </div>
      <div class="body-sm mt-1" style="color:var(--ink);">${body}</div>
    </div>`;
}

function reason(n, title, body, state) {
  const dot = state==='conflict' ? 'var(--orange-600)' : 'var(--lime-600)';
  return `
    <div class="reveal flex gap-3 mb-3">
      <div style="width:26px; height:26px; border:var(--border); border-radius:var(--radius-pill); background:${dot}; color:#fff; display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-weight:800; font-size:13px; flex-shrink:0;">${n}</div>
      <div>
        <div style="font-weight:700;">${title}</div>
        <div class="body-sm" style="color:var(--ink);">${body}</div>
      </div>
    </div>`;
}

/* HOA risk row — collapsible. Tier-1 inline peek; the Guideline link opens the modal.
   Optional 2nd clause via clause2/label2. Clause snippet text comes from HOA_DOC. */
function clauseSnippet(id){
  const doc = (window.HOA_DOC && window.HOA_DOC.sections) || [];
  for (const s of doc){ for (const c of s.clauses){ if (c.id===id) return c.text; } }
  return 'Clause text unavailable.';
}
function riskRow(n, title, body, clauseId, clauseLabel, actLabel, clause2, clause2Label){
  const snippet = clauseSnippet(clauseId);
  const link2 = clause2 ? `<button class="risk-link badge badge-blue" data-clause="${clause2}" style="cursor:pointer;"><span class="icon icon-sm">description</span> ${clause2Label} <span class="icon icon-sm">arrow_forward</span></button>` : '';
  return `
    <div class="risk reveal" data-risk="${n}" style="border:var(--border); border-radius:var(--radius-sm); box-shadow:var(--shadow-sm); margin-bottom:var(--sp-2); background:var(--white); overflow:hidden;">
      <button class="risk-head" aria-expanded="false" style="all:unset; cursor:pointer; display:flex; align-items:center; gap:var(--sp-3); padding:var(--sp-3); width:100%; box-sizing:border-box;">
        <span style="width:26px; height:26px; border:var(--border); border-radius:var(--radius-pill); background:var(--orange-600); color:#fff; display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-weight:800; font-size:13px; flex-shrink:0;">${n}</span>
        <span style="flex:1; min-width:0;">
          <span style="display:block; font-weight:700;">${title}</span>
          <span class="body-sm" style="color:var(--gray-600);">${body}</span>
        </span>
        <span class="icon risk-chevron" style="color:var(--gray-600); font-variation-settings:'FILL' 1;">expand_more</span>
      </button>
      <div class="risk-body" style="display:none; padding:var(--sp-3); background:var(--gray-50); border-top:var(--border); border-left:4px solid var(--orange-600);">
        <div class="label mb-1">Source · HOA Architectural &amp; Exterior Standards</div>
        <div class="body-sm" style="color:var(--ink); margin-bottom:var(--sp-3);">${snippet}</div>
        <div class="flex items-center gap-2 flex-wrap">
          <button class="risk-link badge badge-blue" data-clause="${clauseId}" style="cursor:pointer;"><span class="icon icon-sm">description</span> ${clauseLabel} <span class="icon icon-sm">arrow_forward</span></button>
          ${link2}
          <span class="badge badge-lime" style="margin-left:auto;"><span class="icon icon-sm">task_alt</span> ${actLabel}</span>
        </div>
      </div>
    </div>`;
}

/* HOA document modal */
let hoaRendered = false, hoaLastTrigger = null;
function renderHoaDoc(){
  const body = document.getElementById('hoaBody');
  const d = window.HOA_DOC;
  if (!d){ body.innerHTML = '<p class="body-lg">Document unavailable.</p>'; return; }
  document.getElementById('hoaModalTitle').textContent = d.title;
  body.innerHTML = `<div class="label mb-3">${d.subtitle}</div>` + d.sections.map(s=>`
    <div style="margin-bottom:var(--sp-4);">
      <div style="font-family:var(--font-display); font-weight:700; text-transform:uppercase; letter-spacing:0.04em; font-size:16px; margin-bottom:var(--sp-2);">§${s.num} ${s.heading}</div>
      ${s.clauses.map(c=>`<div id="clause-${c.id}" class="hoa-clause" style="border:var(--border); border-radius:var(--radius-sm); padding:var(--sp-3); margin-bottom:var(--sp-2); background:var(--white);"><span class="mono" style="color:var(--blue-600);">§${c.id}</span> <span class="body-sm" style="color:var(--ink);">${c.text}</span></div>`).join('')}
    </div>`).join('');
  hoaRendered = true;
}
function openHoaDoc(clauseId){
  const modal = document.getElementById('hoaModal');
  if (!hoaRendered) renderHoaDoc();
  hoaLastTrigger = document.activeElement;
  modal.style.display = 'flex';
  document.body.style.overflow = 'hidden';
  // clear previous highlight
  document.querySelectorAll('.hoa-clause.is-cited').forEach(el=>{
    el.classList.remove('is-cited');
    el.style.background = 'var(--white)';
    el.style.boxShadow = 'none';
    el.style.borderColor = 'var(--ink)';
  });
  const target = clauseId && document.getElementById('clause-'+clauseId);
  if (target){
    target.classList.add('is-cited');
    target.style.background = 'var(--orange-50)';
    target.style.borderColor = 'var(--orange-600)';
    target.style.boxShadow = 'var(--shadow-sm)';
    const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    target.scrollIntoView({ behavior: reduce ? 'auto' : 'smooth', block: 'center' });
  }
  document.querySelector('#hoaModal [role=dialog]').focus?.();
}
function closeHoaDoc(){
  document.getElementById('hoaModal').style.display = 'none';
  document.body.style.overflow = '';
  if (hoaLastTrigger && hoaLastTrigger.focus) hoaLastTrigger.focus();
}

function escapeHtml(value){
  return String(value ?? '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

function renderAgentStatus(){
  const el = document.getElementById('agentStatus');
  if (!el || !window.LessenAgentConfig) return;
  const config = window.LessenAgentConfig.loadConfig();
  const agent = window.LessenAgentConfig.getStageAgent('pipelineParse', config);
  if (config.liveAgentEnabled && agent){
    el.className = 'badge badge-lime';
    el.innerHTML = `<span class="icon icon-sm">cloud_done</span> Live · ${escapeHtml(agent.name)}`;
  } else {
    el.className = 'badge badge-neutral';
    el.innerHTML = '<span class="icon icon-sm">smart_toy</span> Demo agent';
  }
}

/* ============================================================ APP STATE + RENDER ============================================================ */

let scenarioKey = 'clear';
let stepIndex = 0;
let autoplay = false;
let autoplayTimer = null;

const screensEl = document.getElementById('screens');
const stepperEl = document.getElementById('stepper');

function renderStepper() {
  const total = STEP_TITLES.length;
  let html = '<div class="flex items-start justify-between">';
  for (let i=0;i<total;i++){
    const done = i < stepIndex;
    const current = i === stepIndex;
    const nodeCls = done ? 'is-done' : current ? 'is-current' : '';
    const capCls  = done ? 'is-done' : current ? 'is-current' : '';
    html += `<div class="flex flex-col items-center" style="flex:0 0 auto; width:84px;">
      <div class="step-node ${nodeCls}">${done?'<span class="icon icon-md">check</span>':(i+1)}</div>
      <div class="step-caption ${capCls}">${STEP_TITLES[i]}</div>
    </div>`;
    if (i < total-1) {
      html += `<div class="step-connector ${done?'is-filled':''}" style="margin-top:21px;"><div class="fill"></div></div>`;
    }
  }
  html += '</div>';
  stepperEl.innerHTML = html;
}

function renderScreen() {
  const sc = SCENARIOS[scenarioKey];
  const builder = sc.screens[stepIndex];
  const wrap = document.createElement('div');
  wrap.className = 'screen';

  const statusBadge = stepIndex === sc.screens.length-1
    ? (scenarioKey==='clear'
        ? '<span class="badge badge-lime"><span class="icon icon-sm">check_circle</span> Complete</span>'
        : '<span class="badge badge-orange"><span class="icon icon-sm">schedule</span> Awaiting review</span>')
    : '<span class="badge badge-blue"><span class="icon icon-sm">bolt</span> In progress</span>';

  wrap.innerHTML = `
    <div class="flex items-center justify-between mb-4 flex-wrap gap-2">
      <div class="h2">Step ${stepIndex+1} of ${sc.screens.length} — ${STEP_TITLES[stepIndex]}</div>
      ${statusBadge}
    </div>
    ${builder()}`;

  screensEl.innerHTML = '';
  screensEl.appendChild(wrap);
  // force reflow then activate (so the entry animation always plays)
  void wrap.offsetWidth;
  wrap.classList.add('is-active');

  animateMeters(wrap);
  animateCounters(wrap);
  staggerReveals(wrap);
  updateControls();
}

function animateMeters(root){
  root.querySelectorAll('[data-meter]').forEach(el=>{
    requestAnimationFrame(()=>{ el.style.width = el.dataset.meter + '%'; });
  });
}

function animateCounters(root){
  root.querySelectorAll('[data-counter]').forEach(el=>{
    const target = parseInt(el.dataset.counter,10);
    const dur = 900; const start = performance.now();
    function tick(now){
      const p = Math.min(1,(now-start)/dur);
      el.textContent = Math.round(p*target);
      if (p<1) requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  });
}

function staggerReveals(root){
  root.querySelectorAll('.reveal').forEach((el,i)=>{
    el.style.animationDelay = (i*70)+'ms';
  });
}

function updateControls(){
  const sc = SCENARIOS[scenarioKey];
  document.getElementById('backBtn').disabled = stepIndex === 0;
  const nextBtn = document.getElementById('nextBtn');
  const last = stepIndex === sc.screens.length-1;
  nextBtn.innerHTML = last
    ? '<span class="icon icon-md">restart_alt</span> Start over'
    : `Next: ${STEP_TITLES[stepIndex+1]} <span class="icon icon-md">arrow_forward</span>`;
  document.getElementById('stepReadout').innerHTML =
    `${sc.name} · <span class="mono" style="font-size:12px;">${sc.wo}</span> · ${last? sc.finalStatus : 'running'}`;
}

function go(delta){
  const sc = SCENARIOS[scenarioKey];
  const last = stepIndex === sc.screens.length-1;
  if (delta>0 && last){ stepIndex = 0; }   // "Start over"
  else { stepIndex = Math.max(0, Math.min(sc.screens.length-1, stepIndex+delta)); }
  renderStepper();
  renderScreen();
}

/* ---- autoplay ---- */
function setAutoplay(on){
  autoplay = on;
  const icon = document.getElementById('autoplayIcon');
  const label = document.getElementById('autoplayLabel');
  const btn = document.getElementById('autoplayBtn');
  if (on){
    icon.textContent='pause'; label.textContent='Pause'; btn.classList.remove('btn-primary'); btn.classList.add('btn-secondary');
    tickAutoplay();
  } else {
    icon.textContent='play_arrow'; label.textContent='Watch it run'; btn.classList.add('btn-primary'); btn.classList.remove('btn-secondary');
    clearTimeout(autoplayTimer);
  }
}
function tickAutoplay(){
  clearTimeout(autoplayTimer);
  autoplayTimer = setTimeout(()=>{
    const sc = SCENARIOS[scenarioKey];
    if (stepIndex < sc.screens.length-1){ go(1); tickAutoplay(); }
    else { setAutoplay(false); }   // stop at the end
  }, 2200);
}

/* ---- scenario switch ---- */
function setScenario(key){
  scenarioKey = key;
  stepIndex = 0;
  const labels = { clear:'Clear path', conflict:'Conflict', hoa:'HOA exterior' };
  document.getElementById('scenarioLabel').textContent = 'Scenario: ' + labels[key];
  renderStepper();
  renderScreen();
}

/* ============================================================ WIRE UP ============================================================ */
document.getElementById('nextBtn').addEventListener('click', ()=>{ setAutoplay(false); go(1); });
document.getElementById('backBtn').addEventListener('click', ()=>{ setAutoplay(false); go(-1); });
document.getElementById('scenarioToggle').addEventListener('click', ()=>{
  setAutoplay(false);
  const order = ['clear','conflict','hoa'];
  const next = order[(order.indexOf(scenarioKey)+1) % order.length];
  setScenario(next);
});
document.getElementById('autoplayBtn').addEventListener('click', ()=>{
  if (!autoplay && stepIndex === SCENARIOS[scenarioKey].screens.length-1) stepIndex = 0; // restart if at end
  setAutoplay(!autoplay);
  if (autoplay){ renderStepper(); renderScreen(); }
});
document.addEventListener('keydown', e=>{
  if (e.key==='ArrowRight'){ setAutoplay(false); go(1); }
  if (e.key==='ArrowLeft'){ setAutoplay(false); go(-1); }
});

/* HOA risk-row expand/collapse (delegated; survives re-render) */
screensEl.addEventListener('click', e=>{
  const head = e.target.closest('.risk-head');
  if (!head) return;
  const body = head.parentElement.querySelector('.risk-body');
  const chev = head.querySelector('.risk-chevron');
  const open = body.style.display !== 'none';
  body.style.display = open ? 'none' : 'block';
  head.setAttribute('aria-expanded', String(!open));
  if (chev) chev.textContent = open ? 'expand_more' : 'expand_less';
});

/* Guideline link → open modal (delegated) */
screensEl.addEventListener('click', e=>{
  const link = e.target.closest('.risk-link');
  if (!link) return;
  openHoaDoc(link.getAttribute('data-clause'));
});
document.getElementById('hoaClose').addEventListener('click', closeHoaDoc);
document.getElementById('hoaScrim').addEventListener('click', closeHoaDoc);
document.addEventListener('keydown', e=>{ if (e.key==='Escape') closeHoaDoc(); });

// expose for headless verification (harmless in prod)
window.SCENARIOS = SCENARIOS;
window.setScenario = setScenario;
window.renderStepper = renderStepper;
window.renderScreen = renderScreen;
Object.defineProperty(window, 'stepIndex', { get:()=>stepIndex, set:v=>{stepIndex=v;} });
window.openHoaDoc = openHoaDoc;
window.closeHoaDoc = closeHoaDoc;

// init
window.addEventListener('storage', event=>{
  if (event.key === window.LessenAgentConfig?.STORAGE_KEY) renderAgentStatus();
});
window.addEventListener('lessen-agent-config-change', renderAgentStatus);
renderAgentStatus();
renderStepper();
renderScreen();
</script>
</body>
</html>
