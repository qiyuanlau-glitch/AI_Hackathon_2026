  @media (prefers-reduced-motion: reduce){ html.app-ready body{ transition:none; } }

<script>
  (function(){
    const root = document.documentElement;
    let revealed = false;
    function reveal(){
      if (revealed) return;
      revealed = true;
      root.classList.add('app-ready');
      root.classList.remove('app-loading');
    }
    function wait(ms){ return new Promise(resolve=>setTimeout(resolve, ms)); }
    function criticalFontsReady(){
      if (!document.fonts || !document.fonts.load || !document.fonts.check) return Promise.resolve();
      const fonts = [
        '400 16px "DM Sans"',
        '800 32px "Barlow Condensed"',
        '400 24px "Material Symbols Sharp"',
      ];
      if (fonts.every(font=>document.fonts.check(font))) return Promise.resolve();
      return Promise.allSettled(fonts.map(font=>document.fonts.load(font)));
    }
    function waitForFirstPaintAssets(){
      Promise.race([criticalFontsReady(), wait(450)]).then(reveal, reveal);
    }
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', waitForFirstPaintAssets, { once:true });
    else waitForFirstPaintAssets();
    window.addEventListener('load', reveal, { once:true });
    setTimeout(reveal, 900);
  })();
</script>

function responsibilityTone(responsibility, confidenceLevel){
  const value = String(responsibility || '').toLowerCase();
  const confidence = String(confidenceLevel || '').toLowerCase();
  if (value.includes('tenant') || value.includes('resident')){
    return { bg:'var(--orange-50)', border:'var(--orange-600)', badge:'badge-orange' };
  }
  if (value.includes('unknown') || confidence === 'low'){
    return { bg:'var(--orange-50)', border:'var(--orange-600)', badge:'badge-orange' };
  }
  return { bg:'var(--lime-50)', border:'var(--lime-600)', badge:'badge-lime' };
}

function confidenceText(summary){
  const score = summary.confidenceScore;
  const level = summary.confidenceLevel;
  if (score !== null && score !== undefined && level) return `Confidence: ${score}% · ${level}`;
  if (score !== null && score !== undefined) return `Confidence: ${score}%`;
  if (level) return `Confidence: ${level}`;
  return 'Confidence unavailable';
}

function billingCopy(summary){
  const responsibility = String(summary.responsibility || '').toLowerCase();
  const reference = summary.leaseReference ? ` (${summary.leaseReference})` : '';

  if (responsibility.includes('tenant') || responsibility.includes('resident')){
    return {
      title: 'May be your responsibility',
      detail: `The agent flagged tenant responsibility${reference}. Review before approving dispatch.`,
    };
  }

  if (responsibility.includes('unknown')){
    return {
      title: 'Needs review before billing',
      detail: `The agent could not determine responsibility confidently${reference}. A coordinator may need to confirm before dispatch.`,
    };
  }

  return {
    title: 'No cost to you',
    detail: `Billed to ${summary.responsibility || 'landlord'}${reference}.`,
  };
}

function formatDateTime(value){
  const date = new Date(value);
  if (Number.isNaN(date.getTime())) return '-';
  return date.toLocaleString('en-GB', {
    day: '2-digit',
    month: 'short',
    year: 'numeric',
    hour: '2-digit',
    minute: '2-digit',
    hour12: false,
  }).replace(',', ', ');
}

function normalizeHistoryItem(item){
  const category = item.serviceCategoryName || item.categoryName || '-';
  const serviceType = item.serviceProblemName || item.typeName || '-';
  const problemCode = item.serviceCodeName || item.problemCode || '-';
  return {
    orderId: item.workOrderId || item.id || '-',
    issue: item.desc || item.serviceProblemName || item.typeName || item.serviceCategoryName || item.categoryName || '-',
    unit: item.unit || '-',
    status: String(item.status || 'DISPATCHED').toUpperCase(),
    submittedAt: item.submittedAt || item.createdAt || item.insertedAt,
    category,
    serviceType,
    problemCode,
    address: item.locationAddress || item.address || '-',
    description: item.desc || item.issue || item.serviceProblemName || '-',
    photos: Array.isArray(item.uploads) ? item.uploads : [],
    raw: item,
  };
}

function findCategoryIdByName(name){
  const row = SERVICE_CATEGORIES.find(([, label]) => label === name);
  return row ? row[0] : '';

function findTypeIdByName(categoryId, name){
  const rows = SERVICE_TYPES_BY_CATEGORY[categoryId] || [];
  const row = rows.find(([, label]) => label === name);
  return row ? row[0] : '';

function findCodeIdByName(typeId, name){
  const rows = SERVICE_CODES_BY_TYPE[typeId] || [];

/* ============================================================ RENDER + ACTIVATE ============================================================ */
function mount(html){
  screensEl.innerHTML = html;
  const scr = screensEl.querySelector('.screen');
  void scr.offsetWidth;            // reflow → animation replays
  scr.classList.add('is-active');
  scr.querySelectorAll('.reveal').forEach((el,i)=> el.style.animationDelay = (i*80)+'ms');
  renderProgress();
  return scr;
}

/* ============================================================ LOADER — 5s between screens ============================================================ */
/* Playful Claude-Code-style verbs. Each transition gets a themed set so the words
   match what the agent is "doing" on the way to that screen. */
const LOADER_THEMES = {
  parsing: {
    sub: 'Reading your report and checking who’s responsible',
    verbs: ['Spelunking', 'Parsing', 'Deliberating', 'Cross-referencing', 'Triangulating'],
  },
  dispatching: {
    sub: 'Locking in your vendor and routing the work order',
    verbs: ['Puttering', 'Dispatching', 'Wrangling', 'Orchestrating', 'Finalising'],
  },
  escalating: {
    sub: 'Flagging this for a human coordinator',
    verbs: ['Pondering', 'Escalating', 'Looping in a human', 'Double-checking', 'Hand-balling'],
  },
  thinking: {
    sub: 'One moment',
    verbs: ['Thinking', 'Noodling', 'Mulling', 'Computing', 'Tinkering'],
  },
};
const LOADER_MS = 5000;
let loaderTimers = [];
function clearLoader(){ loaderTimers.forEach(t=> clearTimeout(t) ); loaderTimers.forEach(t=> clearInterval(t) ); loaderTimers = []; }

function screenLoader(theme){
  return `
    <div class="screen">
      <div class="loader">
        <div class="loader-mark"><span class="icon icon-xl" style="color:var(--blue-600);">smart_toy</span></div>
        <div class="loader-verb"><span id="ld-verb">${theme.verbs[0]}</span><span class="dots"></span></div>
        <div class="loader-sub">${theme.sub}</div>
        <div class="loader-bar"><div class="fill" id="ld-fill"></div></div>
        <div class="loader-pct"><span id="ld-pct">0</span>%</div>
      </div>
    </div>`;
}

const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

function handleTransitionError(error){
  clearLoader();
  console.error(error);
  state.agentError = error.message || String(error);
  if (!state.summary) state.summary = stubAgentSummary({
    ok: false,
    title: 'Live agent failed',
    detail: state.agentError,
  });
  showSummary();
}

function runTransitionNext(next){
  clearLoader();
  Promise.resolve(next()).catch(handleTransitionError);
}

/* Show the loader for ~5s, rotating verbs + filling the bar, then run next(). */
function transitionTo(next, themeKey){
  clearLoader();
  if (reduceMotion){ runTransitionNext(next); return; }   // accessibility: skip the wait
  const theme = LOADER_THEMES[themeKey] || LOADER_THEMES.thinking;
  mount(screenLoader(theme));

  const verbEl = document.getElementById('ld-verb');
  const fillEl = document.getElementById('ld-fill');
  const pctEl  = document.getElementById('ld-pct');

  // rotate verbs every 1.1s
  let vi = 0;
  const verbTimer = setInterval(()=>{
    vi = (vi+1) % theme.verbs.length;
    if (verbEl) verbEl.textContent = theme.verbs[vi];
  }, 1100);
  loaderTimers.push(verbTimer);

  // progress bar ticks toward 100% over LOADER_MS
  const start = performance.now();
  const progTimer = setInterval(()=>{
    const p = Math.min(100, Math.round(((performance.now()-start)/LOADER_MS)*100));
    if (fillEl) fillEl.style.width = p + '%';
    if (pctEl)  pctEl.textContent = p;
    if (p >= 100) clearInterval(progTimer);
  }, 80);
  loaderTimers.push(progTimer);

  const done = setTimeout(()=> runTransitionNext(next), LOADER_MS);
  loaderTimers.push(done);
}

/* Show the loader until next() resolves. Used for live API-backed transitions. */
function transitionToWhenReady(next, themeKey){
  clearLoader();
  if (reduceMotion){ Promise.resolve(next()).catch(handleTransitionError); return; }
  const theme = LOADER_THEMES[themeKey] || LOADER_THEMES.thinking;
  mount(screenLoader(theme));

  const verbEl = document.getElementById('ld-verb');
  const fillEl = document.getElementById('ld-fill');
  const pctEl  = document.getElementById('ld-pct');

  let vi = 0;
  const verbTimer = setInterval(()=>{
    vi = (vi+1) % theme.verbs.length;
    if (verbEl) verbEl.textContent = theme.verbs[vi];
  }, 1100);
  loaderTimers.push(verbTimer);

  const start = performance.now();
  const progTimer = setInterval(()=>{
    const elapsed = performance.now() - start;
    const p = Math.min(95, Math.round(12 + 83 * (1 - Math.exp(-elapsed / 2400))));
    if (fillEl) fillEl.style.width = p + '%';
    if (pctEl)  pctEl.textContent = p;
  }, 80);
  loaderTimers.push(progTimer);

  Promise.resolve(next())
    .then(()=> clearLoader())
    .catch(handleTransitionError);
}

/* ---------- service taxonomy wiring ---------- */
function escapeHtml(value){
  return String(value ?? '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

function findOption(rows, id){
  return (rows || []).find(([rowId])=> rowId === id) || null;
}

function selectedServiceTaxonomy(){
  const category = findOption(SERVICE_CATEGORIES, state.serviceCategoryId);
  const type = findOption(SERVICE_TYPES_BY_CATEGORY[state.serviceCategoryId], state.serviceTypeId);
  const code = findOption(SERVICE_CODES_BY_TYPE[state.serviceTypeId], state.serviceCodeId);
  return {
    category,
    type,
    code,
    categoryId: category ? category[0] : '',
    categoryName: category ? category[1] : '',
    typeId: type ? type[0] : '',
    typeName: type ? type[1] : '',
    codeId: code ? code[0] : '',
    codeName: code ? code[1] : '',
  };
}

function renderAgentStatus(){
  const el = document.getElementById('agentStatus');
  if (!el || !window.LessenAgentConfig) return;
  const config = window.LessenAgentConfig.loadConfig();
  const agent = window.LessenAgentConfig.getStageAgent('tenantSummary', config);
  if (config.liveAgentEnabled && agent){
    el.className = 'badge badge-lime';
    el.innerHTML = `<span class="icon icon-sm">cloud_done</span> Live · ${escapeHtml(agent.name)}`;
  } else {
    el.className = 'badge badge-neutral';
    el.innerHTML = '<span class="icon icon-sm">smart_toy</span> Demo agent';
  }
}

function populateSelectOptions(selectEl, rows, placeholder, selectedValue){
  selectEl.replaceChildren(new Option(placeholder, ''));
  rows.forEach(([id, name])=> selectEl.add(new Option(name, id)));
  const hasSelection = rows.some(([id])=> id === selectedValue);
  selectEl.value = hasSelection ? selectedValue : '';
  return hasSelection;
}

function clearFieldError(fieldId, errorId){
  document.getElementById(fieldId).classList.remove('invalid');
  document.getElementById(errorId).classList.remove('show');
}

function renderServiceTaxonomyFields(){
  const categoryEl = document.getElementById('f-category');
  const typeEl = document.getElementById('f-type');
  const codeEl = document.getElementById('f-code');

  const categoryOk = populateSelectOptions(categoryEl, SERVICE_CATEGORIES, 'Select service category', state.serviceCategoryId);
  if (!categoryOk){
    state.serviceCategoryId = '';
    state.serviceTypeId = '';
    state.serviceCodeId = '';
  }

  const types = SERVICE_TYPES_BY_CATEGORY[state.serviceCategoryId] || [];
  typeEl.disabled = !state.serviceCategoryId || types.length === 0;
  const typePlaceholder = !state.serviceCategoryId
    ? 'Select category first'
    : types.length
      ? 'Select service type'
      : 'No service types for this category';
  const typeOk = populateSelectOptions(typeEl, types, typePlaceholder, state.serviceTypeId);
  if (!typeOk){
    state.serviceTypeId = '';
    state.serviceCodeId = '';
  }
  if (types.length === 0) clearFieldError('f-type', 'e-type');

  const codes = SERVICE_CODES_BY_TYPE[state.serviceTypeId] || [];
  codeEl.disabled = !state.serviceTypeId || codes.length === 0;
  const codePlaceholder = !state.serviceTypeId
    ? 'Select service type first'
    : codes.length
      ? 'Select problem code'

function addFiles(fileList){

      uploadId: createUploadId(),
      name: f.name,
      path: f.webkitRelativePath || f.name,
      url: URL.createObjectURL(f),
    });
  }

}

    <div class="thumb-wrap"><div class="thumb"><img src="${p.url}" alt="${p.name}"></div><div class="rm" data-i="${i}" title="Remove">×</div></div>`).join('');

async function onSubmit(){
  // validation
  let ok = true;
  const desc = document.getElementById('f-desc');
  const unit = document.getElementById('f-unit');
  const category = document.getElementById('f-category');
  const type = document.getElementById('f-type');
  const code = document.getElementById('f-code');
  state.desc = desc.value.trim();
  state.unit = unit.value.trim();
  state.serviceCategoryId = category.value;
  state.serviceTypeId = type.value;
  state.serviceCodeId = code.value;
  if (!state.desc){ desc.classList.add('invalid'); document.getElementById('e-desc').classList.add('show'); ok=false; }
  if (!state.unit){ unit.classList.add('invalid'); document.getElementById('e-unit').classList.add('show'); ok=false; }
  if (!state.serviceCategoryId){ category.classList.add('invalid'); document.getElementById('e-category').classList.add('show'); ok=false; }
  const typesForCategory = SERVICE_TYPES_BY_CATEGORY[state.serviceCategoryId] || [];
  if (typesForCategory.length && !state.serviceTypeId){ type.classList.add('invalid'); document.getElementById('e-type').classList.add('show'); ok=false; }
  const codesForType = SERVICE_CODES_BY_TYPE[state.serviceTypeId] || [];
  if (state.serviceTypeId && codesForType.length && !state.serviceCodeId){ code.classList.add('invalid'); document.getElementById('e-code').classList.add('show'); ok=false; }
  if (!ok){ document.querySelector('.invalid')?.focus(); return; }

  state.woId = mockWoId();   // WO-YYYY-NNN, mocked per submission
  try {
    state.workOrderSaveError = null;
    await persistWorkOrder();
  } catch (error) {
    state.workOrderSaveError = error.message || String(error);
    alert(`Unable to save work order to MongoDB. ${state.workOrderSaveError}`);
    return;
  }
  // API-backed loader: show the summary as soon as buildSummary() resolves.
  screenIndex = 1;
  transitionToWhenReady(async ()=>{
    await buildSummary();
    showSummary();
  }, 'parsing');
}

async function persistWorkOrder(){
  const payload = JSON.stringify(buildWorkOrderPayload());
  const endpoints = ['/.netlify/functions/work-order-create'];
  if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'){
    endpoints.push('http://127.0.0.1:8787/.netlify/functions/work-order-create');
  }

  let lastError = null;
  for (const endpoint of endpoints){
    try {
      const response = await fetch(endpoint, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          Accept: 'application/json',
        },
        body: payload,
      });
      const text = await response.text();
      let data = null;
      if (text){
        try {
          data = JSON.parse(text);
        } catch {
          data = null;
        }
      }

      if (!response.ok || !data?.ok){
        const shouldTryNext = response.status === 501 && endpoint !== endpoints[endpoints.length - 1];
        if (shouldTryNext){
          lastError = new Error(`HTTP ${response.status}`);
          continue;
        }
        const message = data?.error || `HTTP ${response.status}`;
        throw new Error(message);
      }
      return data;
    } catch (error) {
      lastError = error;
    }
  }

  throw lastError || new Error('Failed to save work order.');
}

/* Payload sent to the OneBrain agent. Exact shape agreed with the agent:
   { wo_id, service_category, service_type, problem_code }.
   Category/type/code are the human-readable names (e.g. "Plumbing"/"Sink"/"Vandalized"),
   not the internal ids. */
function buildAgentPayload(){
  const service = selectedServiceTaxonomy();
  return {
    wo_id: currentWoId(),
    service_category: service.categoryName,
    service_type: service.typeName,
    problem_code: service.codeName,
  };
}

async function callAgent(payload){
  if (!window.LessenAgentConfig) throw new Error('Agent config helper is not loaded.');
  return window.LessenAgentConfig.callStageAgent('tenantSummary', payload);
}

function parseJsonObject(value){
  if (!value) return null;
  if (typeof value === 'object' && !Array.isArray(value)) return value;
  if (typeof value !== 'string') return null;
  try {
    const parsed = JSON.parse(value);
    return parsed && typeof parsed === 'object' && !Array.isArray(parsed) ? parsed : null;
  } catch {
    return null;
  }
}

function firstPresent(...values){
  return values.find(value => value !== null && value !== undefined && String(value).trim() !== '');
}

function extractOneBrainDecision(source){
  if (!source || typeof source !== 'object') return null;
  const candidates = [
    source.summary,
    source.data,
    source.text,
    source.rich_content && source.rich_content.message && source.rich_content.message.text,
    source.message && source.message.text,
    source,
  ];

  for (const candidate of candidates){
    const parsed = parseJsonObject(candidate);
    if (parsed && (
      'responsibility' in parsed ||
      'confidence_score' in parsed ||
      'confidence_level' in parsed ||
      'matched_rule' in parsed ||
      'reasoning' in parsed
    )){
      return parsed;
    }
  }
  return null;
}

function summarizeAgentResult(result){
  if (!result) return null;
  const source = result.data && typeof result.data === 'object'
    ? result.data
    : (result.json && typeof result.json === 'object' ? result.json : {});
  const decision = extractOneBrainDecision(source);
  const summary = source.summary && typeof source.summary === 'object' ? source.summary : source;
  const fallback = stubAgentSummary();

  if (!decision && (!summary || typeof summary !== 'object')) return null;

  const vendor = summary.vendor || summary.assignedVendor || summary.assigned_to;
  const eta = summary.eta || summary.arrivalWindow || summary.arriving;
  const trade = firstPresent(
    decision && (decision.service_category || decision.serviceCategory),
    summary.trade,
    summary.serviceCategory,
    fallback.trade
  );
  const asset = firstPresent(
    decision && (decision.service_type || decision.serviceType),
    summary.asset,
    summary.serviceType,
    fallback.asset
  );
  const problemCode = firstPresent(
    decision && (decision.problem_code || decision.problemCode),
    summary.problemCode,
    summary.problem_code,
    fallback.problemCode
  );

  return {
    ...fallback,
    vendor: vendor || fallback.vendor,
    vendorInitials: summary.vendorInitials || initialsFor(vendor || fallback.vendor),
    vendorCo: summary.vendorCo || summary.vendorCompany || fallback.vendorCo,
    match: summary.match || summary.matchScore || fallback.match,
    eta: eta || fallback.eta,
    travel: summary.travel || fallback.travel,
    phone: summary.phone || fallback.phone,
    trade,
    asset,
    problemCode,
    dispatchSecs: summary.dispatchSecs || fallback.dispatchSecs,
    responsibility: decision ? firstPresent(decision.responsibility) : null,
    confidenceScore: decision ? firstPresent(decision.confidence_score, decision.confidenceScore) : null,
    confidenceLevel: decision ? firstPresent(decision.confidence_level, decision.confidenceLevel) : null,
    matchedRule: decision ? (decision.matched_rule || decision.matchedRule || null) : null,
    leaseReference: decision ? firstPresent(decision.lease_reference, decision.leaseReference) : null,
    reasoning: decision ? firstPresent(decision.reasoning) : null,
  };
}

function initialsFor(name){
  return String(name || '')
    .split(/\s+/)
    .filter(Boolean)
    .slice(0, 2)
    .map(part=>part[0].toUpperCase())
    .join('') || 'AI';
}

/* Local stub so the prototype is fully clickable without a backend. */
function stubAgentSummary(agentStatus, options){
  const includeDecision = !(options && options.includeDecision === false);
  const eta = state.inspection
      ? 'Tomorrow, 9–11 AM'
      : 'Today, 11:00 AM';
  const service = selectedServiceTaxonomy();
  const trade = service.category ? service.category[1] : 'Plumbing';
  const asset = service.type ? service.type[1] : null;
  const problemCode = service.code ? service.code[1] : null;
  const summary = {
    wo: currentWoId(),
    vendor: 'John Tan',
    vendorInitials: 'JT',
    vendorCo: 'FlowFix Plumbing',
    match: '95%',
    eta,
    travel: state.inspection ? 'No travel charge' : '~12 min travel · 2.4 km',
    phone: '+65 8123 4567',
    trade,
    asset,
    problemCode,
    tenantFirst: 'Priya',
    dispatchSecs: 38,
    agentStatus: agentStatus || null,
  };

  if (includeDecision){

    summary.matchedRule = { category: trade, type: asset, problem_code: problemCode };
    summary.leaseReference = 'Lease clause 5.1';
    summary.reasoning = 'The selected issue matches a landlord-maintained repair category.';
  }

  return summary;
}

/* Derive the tenant-facing summary from the live agent when enabled, with a
   local fallback for demo mode or responses whose shape is not known yet. */
async function buildSummary(){
  state.agentResponse = null;
  state.agentError = null;

  const config = window.LessenAgentConfig ? window.LessenAgentConfig.loadConfig() : null;
  if (!config || !config.liveAgentEnabled){
    state.summary = stubAgentSummary();
    return state.summary;
  }

  const agent = window.LessenAgentConfig.getStageAgent('tenantSummary', config);
  try {
    const payload = buildAgentPayload();
    console.log('[agent] request payload →', payload);
    const result = await callAgent(payload);
    console.log('[agent] raw response →', result);
    state.agentResponse = result;
    const normalized = summarizeAgentResult(result) || stubAgentSummary(null, { includeDecision: false });
    normalized.agentStatus = {
      ok: result.ok,
      title: `${agent ? agent.name : 'Configured agent'} returned ${result.status}`,
      detail: result.proxyError
        ? result.proxyError
        : result.data
        ? 'JSON received. Summary uses recognized fields when present and demo defaults for missing fields.'
        : (result.jsonError ? `Response was not valid JSON: ${result.jsonError}` : 'Response received without JSON body.'),
    };
    state.summary = normalized;
  } catch (error) {
    state.agentError = error.message || String(error);
    state.summary = stubAgentSummary({
      ok: false,
      title: `${agent ? agent.name : 'Configured agent'} request failed`,
      detail: state.agentError,
    }, { includeDecision: false });
  }
  return state.summary;
}

    const service = {
      category: findOption(SERVICE_CATEGORIES, categoryEl.value),
      type: findOption(SERVICE_TYPES_BY_CATEGORY[categoryEl.value], typeEl.value),
      code: findOption(SERVICE_CODES_BY_TYPE[typeEl.value], codeEl.value),
    };
    const messageText = String(descEl.value || '').trim();
    const unitText = String(unitEl.value || '').trim();
    const addressText = String(addressEl.value || '').trim();
    if (!messageText || !service.category || !service.type || !service.code || !unitText || !addressText){
      alert('Please fill all required fields.');
      return;
    }

    const selectedFiles = Array.from(photosEl?.files || []);
    const uploads = selectedFiles.length
      ? selectedFiles.map(file => ({
          uploadId: createUploadId(),
          fileName: file.name,
          filePath: file.webkitRelativePath || file.name,
        }))
      : (Array.isArray(found.raw?.uploads) ? found.raw.uploads : []);

    try {
      await persistWorkOrderUpdate({
        workOrderId: found.orderId,
        desc: messageText,
        serviceCategoryName: service.category[1],
        serviceProblemName: service.type[1],
        serviceCodeName: service.code[1],
        unit: unitText,
        locationAddress: addressText,
        inspection: Boolean(inspectEl?.checked),
        uploads,
      });
      historyItemsCache = [];
      if (mode === 'submit'){
        alert('Updated and submitted successfully.');
      } else {
        alert('Changes saved.');
      }
      navigateTo(`/wo/${encodeURIComponent(found.orderId)}`);
    } catch (error){
      alert(`Unable to update report. ${error.message || String(error)}`);
    }
  }

  document.getElementById('editSaveBtn')?.addEventListener('click', ()=> submitEdit('save'));
  document.getElementById('editSubmitBtn')?.addEventListener('click', ()=> submitEdit('submit'));
}

function restart(){
  state.desc=''; state.unit=''; state.address='Elmwood Heights, Block A';
  state.serviceCategoryId=''; state.serviceTypeId=''; state.serviceCodeId='';
  state.photos=[]; state.inspection=false; state.woId=''; state.agentResponse=null; state.agentError=null; state.summary=null; state.workOrderSaveError=null;
  showReport();
}

function handleRoute(){
  const pathname = window.location.pathname;
  const editMatch = pathname.match(/^\/wo\/([^/]+)\/edit$/);
  if (editMatch){
    showWorkOrderEdit(editMatch[1]);
    return;
  }
  const detailMatch = pathname.match(/^\/wo\/([^/]+)$/);
  if (detailMatch){
    showWorkOrderDetail(detailMatch[1]);
    return;
  }
  if (pathname === '/history' || window.location.hash === '#/history'){
    showHistory();
    return;
  }
  showReport();
}

// init
window.addEventListener('storage', event=>{
  if (event.key === window.LessenAgentConfig?.STORAGE_KEY) renderAgentStatus();
});
window.addEventListener('lessen-agent-config-change', renderAgentStatus);
window.addEventListener('hashchange', handleRoute);
window.addEventListener('popstate', handleRoute);
document.getElementById('historyLink')?.addEventListener('click', event=>{
  event.preventDefault();
  navigateTo('/history');
});
renderAgentStatus();
handleRoute();
</script>
</body>
</html>
